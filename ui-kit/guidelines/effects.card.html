<!-- @dsCard group="Spacing" viewport="700x220" subtitle="Borders, shadows, transitions, radii" name="Effects & Motion" -->
<link rel="stylesheet" href="../styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { background: #1A1A1A; margin: 0; padding: 20px 24px; font-family: 'Barlow', sans-serif; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  .block { display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 10px; font-weight: 600; color: #555; letter-spacing: 0.08em; text-transform: uppercase; }
  .chip { width: 80px; height: 48px; background: #2E2E2E; }
  .sep { width: 1px; background: rgba(255,255,255,0.08); margin: 0 4px; }
</style>
<div class="row">
  <!-- Borders -->
  <div class="block">
    <div class="label">Borders</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="height:28px;width:120px;background:#2E2E2E;border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;padding:0 10px;font-size:11px;color:#555">subtle</div>
      <div style="height:28px;width:120px;background:#2E2E2E;border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;padding:0 10px;font-size:11px;color:#888">default</div>
      <div style="height:28px;width:120px;background:#2E2E2E;border:1px solid rgba(255,255,255,0.28);display:flex;align-items:center;padding:0 10px;font-size:11px;color:#bbb">strong</div>
      <div style="height:28px;width:120px;background:#2E2E2E;border:1px solid #E8192C;display:flex;align-items:center;padding:0 10px;font-size:11px;color:#E8192C">accent</div>
    </div>
  </div>
  <div class="sep"></div>
  <!-- Shadows -->
  <div class="block">
    <div class="label">Shadows</div>
    <div style="display:flex;gap:12px;align-items:flex-end;padding:16px 8px 8px">
      <div style="width:48px;height:36px;background:#2E2E2E;box-shadow:0 1px 3px rgba(0,0,0,.45)"></div>
      <div style="width:48px;height:36px;background:#2E2E2E;box-shadow:0 2px 8px rgba(0,0,0,.55)"></div>
      <div style="width:48px;height:36px;background:#2E2E2E;box-shadow:0 4px 16px rgba(0,0,0,.60)"></div>
      <div style="width:48px;height:36px;background:#2E2E2E;box-shadow:0 8px 32px rgba(0,0,0,.65)"></div>
    </div>
    <div style="display:flex;gap:12px;padding:0 8px">
      <div style="width:48px;font-size:10px;color:#444;text-align:center">xs</div>
      <div style="width:48px;font-size:10px;color:#444;text-align:center">sm</div>
      <div style="width:48px;font-size:10px;color:#444;text-align:center">md</div>
      <div style="width:48px;font-size:10px;color:#444;text-align:center">lg</div>
    </div>
  </div>
  <div class="sep"></div>
  <!-- Radii -->
  <div class="block">
    <div class="label">Radii</div>
    <div style="display:flex;gap:12px;align-items:center;padding:16px 8px 8px">
      <div style="width:48px;height:36px;background:#2E2E2E;border-radius:0"></div>
      <div style="width:48px;height:36px;background:#2E2E2E;border-radius:2px"></div>
      <div style="width:48px;height:36px;background:#2E2E2E;border-radius:4px"></div>
      <div style="width:48px;height:36px;background:#2E2E2E;border-radius:9999px"></div>
    </div>
    <div style="display:flex;gap:12px;padding:0 8px">
      <div style="width:48px;font-size:10px;color:#444;text-align:center">none</div>
      <div style="width:48px;font-size:10px;color:#444;text-align:center">xs 2px</div>
      <div style="width:48px;font-size:10px;color:#444;text-align:center">sm 4px</div>
      <div style="width:48px;font-size:10px;color:#444;text-align:center">full</div>
    </div>
  </div>
  <div class="sep"></div>
  <!-- Transitions -->
  <div class="block">
    <div class="label">Motion</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">
      <div style="font-size:11px;color:#555">fast &nbsp;&nbsp;&nbsp;<span style="color:#888">0.12s ease</span></div>
      <div style="font-size:11px;color:#555">base &nbsp;&nbsp;<span style="color:#888">0.20s ease</span></div>
      <div style="font-size:11px;color:#555">slow &nbsp;&nbsp;<span style="color:#888">0.35s cubic</span></div>
    </div>
  </div>
</div>
