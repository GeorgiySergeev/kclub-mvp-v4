<!-- @dsCard group="Colors" viewport="700x200" subtitle="Dark surface palette" name="Dark Palette" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: #111; margin: 0; padding: 20px 24px; font-family: 'Barlow', sans-serif; }
  .row { display: flex; gap: 6px; align-items: flex-end; }
  .swatch { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 52px; width: 100%; }
  .label { font-size: 10px; font-weight: 600; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }
  .hex { font-size: 11px; color: #555; font-weight: 400; margin-top: 2px; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<div class="row">
  <div class="swatch"><div class="chip" style="background:#0D0D0D"></div><div class="label">950</div><div class="hex">#0D0D0D</div></div>
  <div class="swatch"><div class="chip" style="background:#111111"></div><div class="label">900</div><div class="hex">#111111</div></div>
  <div class="swatch"><div class="chip" style="background:#161616"></div><div class="label">850</div><div class="hex">#161616</div></div>
  <div class="swatch"><div class="chip" style="background:#1A1A1A; outline: 1px solid #333"></div><div class="label">800 — page</div><div class="hex">#1A1A1A</div></div>
  <div class="swatch"><div class="chip" style="background:#222222"></div><div class="label">700 — section</div><div class="hex">#222222</div></div>
  <div class="swatch"><div class="chip" style="background:#282828"></div><div class="label">600 — surface</div><div class="hex">#282828</div></div>
  <div class="swatch"><div class="chip" style="background:#2E2E2E"></div><div class="label">500 — card</div><div class="hex">#2E2E2E</div></div>
  <div class="swatch"><div class="chip" style="background:#383838"></div><div class="label">400 — hover</div><div class="hex">#383838</div></div>
  <div class="swatch"><div class="chip" style="background:#484848"></div><div class="label">300</div><div class="hex">#484848</div></div>
</div>
