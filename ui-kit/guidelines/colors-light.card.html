<!-- @dsCard group="Colors" viewport="700x200" subtitle="Neutral & light surfaces" name="Light & Neutral" -->
<link rel="stylesheet" href="../styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { background: #1A1A1A; margin: 0; padding: 20px 24px; font-family: 'Barlow', sans-serif; }
  .row { display: flex; gap: 6px; align-items: flex-end; }
  .swatch { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 52px; width: 100%; }
  .label { font-size: 10px; font-weight: 600; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }
  .hex { font-size: 11px; color: #555; margin-top: 2px; }
</style>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#6A6A6A"></div><div class="label">neutral 500</div><div class="hex">#6A6A6A</div></div>
  <div class="swatch"><div class="chip" style="background:#888888"></div><div class="label">neutral 400</div><div class="hex">#888888</div></div>
  <div class="swatch"><div class="chip" style="background:#AAAAAA"></div><div class="label">neutral 300</div><div class="hex">#AAAAAA</div></div>
  <div class="swatch"><div class="chip" style="background:#CCCCCC"></div><div class="label">neutral 200</div><div class="hex">#CCCCCC</div></div>
  <div class="swatch"><div class="chip" style="background:#E0E0DE"></div><div class="label">neutral 100</div><div class="hex">#E0E0DE</div></div>
  <div class="swatch"><div class="chip" style="background:#E4E4E2"></div><div class="label">light 300</div><div class="hex">#E4E4E2</div></div>
  <div class="swatch"><div class="chip" style="background:#F2F2F0; outline:1px solid #ddd"></div><div class="label">light 100 — bg</div><div class="hex">#F2F2F0</div></div>
  <div class="swatch"><div class="chip" style="background:#F8F8F7; outline:1px solid #ddd"></div><div class="label">light 50</div><div class="hex">#F8F8F7</div></div>
  <div class="swatch"><div class="chip" style="background:#FFFFFF; outline:1px solid #ddd"></div><div class="label">white</div><div class="hex">#FFFFFF</div></div>
</div>
