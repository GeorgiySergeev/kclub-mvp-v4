<link rel="stylesheet" href="../styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { background: #1A1A1A; margin: 0; padding: 24px; font-family: 'Barlow', sans-serif; }
  .grid { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: #E8192C; width: 20px; }
  .token { font-size: 10px; color: #555; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .val { font-size: 10px; color: #444; }
  .divider { width: 1px; background: rgba(255,255,255,0.08); height: 80px; }
</style>
<div class="grid">
  <div class="item"><div class="bar" style="height:4px"></div><div class="token">–1</div><div class="val">4</div></div>

  <div class="item"><div class="bar" style="height:80px;background:#483"></div><div class="token">–20</div><div class="val">80</div></div>
